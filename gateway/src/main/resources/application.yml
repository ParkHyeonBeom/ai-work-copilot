server:
  port: 8080

spring:
  application:
    name: gateway
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**, /api/auth/**, /login/oauth2/**
        - id: integration-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/integrations/**
        - id: ai-router-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**
        - id: briefing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/briefings/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-testing-only-change-in-production-minimum-256-bits}

server:
  port: 8080

spring:
  application:
    name: gateway
  profiles:
    active: local
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**, /api/auth/**, /oauth2/**, /login/oauth2/**
        - id: integration-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/integrations/**
        - id: ai-router-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**
        - id: briefing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/briefings/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://ai-work-copilot-phb.kro.kr"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-testing-only-change-in-production-minimum-256-bits}

---
spring:
  config:
    activate:
      on-profile: local
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: k8s
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**, /api/auth/**, /oauth2/**, /login/oauth2/**
        - id: integration-service
          uri: http://integration-service:8082
          predicates:
            - Path=/api/integrations/**
        - id: ai-router-service
          uri: http://ai-router-service:8083
          predicates:
            - Path=/api/ai/**
        - id: briefing-service
          uri: http://briefing-service:8084
          predicates:
            - Path=/api/briefings/**

apiVersion: apps/v1
kind: Deployment
metadata:
  name: briefing-service
  namespace: workcopilot
  labels:
    app: briefing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: briefing-service
  template:
    metadata:
      labels:
        app: briefing-service
    spec:
      containers:
        - name: briefing-service
          image: ghcr.io/parkhyeonbeom/workcopilot-briefing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "workcopilot_briefing"
            - name: DB_USERNAME
              value: "workcopilot"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30

apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: workcopilot
  labels:
    app: chat-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: ghcr.io/parkhyeonbeom/workcopilot-chat-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          env:
            - name: TZ
              value: "Asia/Seoul"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "workcopilot_chat"
            - name: DB_USERNAME
              value: "workcopilot"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: CHAT_FILE_DIR
              value: "/data/chat-files"
          volumeMounts:
            - name: chat-files
              mountPath: /data/chat-files
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: chat-files
          emptyDir: {}

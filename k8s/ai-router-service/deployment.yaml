apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-router-service
  namespace: workcopilot
  labels:
    app: ai-router-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-router-service
  template:
    metadata:
      labels:
        app: ai-router-service
    spec:
      containers:
        - name: ai-router-service
          image: ghcr.io/parkhyeonbeom/workcopilot-ai-router-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
                  optional: true
            - name: OLLAMA_ENABLED
              value: "true"
            - name: OLLAMA_BASE_URL
              value: "http://host.docker.internal:11434"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30

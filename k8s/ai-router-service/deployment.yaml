apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-router-service
  namespace: workcopilot
  labels:
    app: ai-router-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-router-service
  template:
    metadata:
      labels:
        app: ai-router-service
    spec:
      containers:
        - name: ai-router-service
          image: ghcr.io/parkhyeonbeom/workcopilot-ai-router-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "workcopilot_ai"
            - name: DB_USERNAME
              value: "workcopilot"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: GEMINI_ENABLED
              value: "true"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: GEMINI_API_KEY
                  optional: true
            - name: INTEGRATION_SERVICE_URL
              value: "http://integration-service:8082"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:8085"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30

server:
  port: 8083

spring:
  application:
    name: ai-router-service
  profiles:
    active: local

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-testing-only-change-in-production-minimum-256-bits}

integration-service:
  url: ${INTEGRATION_SERVICE_URL:http://localhost:8082}

---
spring:
  config:
    activate:
      on-profile: local

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:h2:mem:airouterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-dummy}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://100.95.227.98:11434}
      init:
        timeout: 120s
        pull-model-strategy: never
      connection:
        timeout: 30s
      request:
        timeout: 180s
      chat:
        options:
          model: llama3.1:8b-instruct-q4_K_M
          num-predict: 2048
      embedding:
        options:
          model: nomic-embed-text

ai:
  anthropic:
    enabled: ${ANTHROPIC_ENABLED:false}
  ollama:
    enabled: ${OLLAMA_ENABLED:true}

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:workcopilot_ai}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:workcopilot}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.1:8b-instruct-q4_K_M
      embedding:
        options:
          model: nomic-embed-text

ai:
  ollama:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: k8s

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:h2:mem:airouterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-dummy}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://homeserver:11434}
      init:
        timeout: 120s
        pull-model-strategy: never
      connection:
        timeout: 30s
      request:
        timeout: 180s
      chat:
        options:
          model: llama3.1:8b-instruct-q4_K_M
          num-predict: 2048

integration-service:
  url: http://integration-service:8082

ai:
  ollama:
    enabled: ${OLLAMA_ENABLED:true}

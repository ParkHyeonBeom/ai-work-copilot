name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/kustomization.yaml'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Set short SHA
        id: vars
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push gateway
        run: |
          docker build -t ghcr.io/parkhyeonbeom/workcopilot-gateway:${{ steps.vars.outputs.sha7 }} gateway/
          docker push ghcr.io/parkhyeonbeom/workcopilot-gateway:${{ steps.vars.outputs.sha7 }}

      - name: Build & Push user-service
        run: |
          docker build -t ghcr.io/parkhyeonbeom/workcopilot-user-service:${{ steps.vars.outputs.sha7 }} user-service/
          docker push ghcr.io/parkhyeonbeom/workcopilot-user-service:${{ steps.vars.outputs.sha7 }}

      - name: Build & Push integration-service
        run: |
          docker build -t ghcr.io/parkhyeonbeom/workcopilot-integration-service:${{ steps.vars.outputs.sha7 }} integration-service/
          docker push ghcr.io/parkhyeonbeom/workcopilot-integration-service:${{ steps.vars.outputs.sha7 }}

      - name: Build & Push ai-router-service
        run: |
          docker build -t ghcr.io/parkhyeonbeom/workcopilot-ai-router-service:${{ steps.vars.outputs.sha7 }} ai-router-service/
          docker push ghcr.io/parkhyeonbeom/workcopilot-ai-router-service:${{ steps.vars.outputs.sha7 }}

      - name: Build & Push briefing-service
        run: |
          docker build -t ghcr.io/parkhyeonbeom/workcopilot-briefing-service:${{ steps.vars.outputs.sha7 }} briefing-service/
          docker push ghcr.io/parkhyeonbeom/workcopilot-briefing-service:${{ steps.vars.outputs.sha7 }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tags in kustomization.yaml
        working-directory: k8s
        run: |
          kustomize edit set image \
            ghcr.io/parkhyeonbeom/workcopilot-gateway=ghcr.io/parkhyeonbeom/workcopilot-gateway:${{ steps.vars.outputs.sha7 }} \
            ghcr.io/parkhyeonbeom/workcopilot-user-service=ghcr.io/parkhyeonbeom/workcopilot-user-service:${{ steps.vars.outputs.sha7 }} \
            ghcr.io/parkhyeonbeom/workcopilot-integration-service=ghcr.io/parkhyeonbeom/workcopilot-integration-service:${{ steps.vars.outputs.sha7 }} \
            ghcr.io/parkhyeonbeom/workcopilot-ai-router-service=ghcr.io/parkhyeonbeom/workcopilot-ai-router-service:${{ steps.vars.outputs.sha7 }} \
            ghcr.io/parkhyeonbeom/workcopilot-briefing-service=ghcr.io/parkhyeonbeom/workcopilot-briefing-service:${{ steps.vars.outputs.sha7 }}

      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore: update image tags to ${GITHUB_SHA::7} [skip ci]"
          git push
